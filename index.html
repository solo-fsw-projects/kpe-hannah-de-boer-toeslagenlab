<html>
<head>
    <link rel="stylesheet" href="toeslagen.css">
</head>
<body>
<div style="width: 770px; margin: 0 auto;">
    <div class="progress-bar">
        <div class="line"></div>
        <div class="circle-container">
            <div class="circle"></div>
            <div class="month-name"></div>
        </div>
        <div class="saldo">
            <div class="pinpas"><img src="pinpas.png"/></div>
            <div class="amount-container">
                Je saldo:<br/>
                &euro; <div class="amount"></div>
            </div>
        </div>
    </div>
    <div id="description" style="height: 200px"></div>
    <div class="QuestionText">
        Income:<br>
        {{income}}<br>
        Fixed expenses:<br>
        {{fixed_expenses}}<br>
        Variable:<br>
        {{variable_expense_name}}</div>
    <button id="next-button">Volgende</button>
    <script src="toeslagen.js"></script>
    <script src="toeslagen.test.js"></script>
</div>
</body>
</html>
