<div class="progress-bar">
    <div class="line"></div>
    <div class="circle-container">
        <div class="circle"></div>
        <div class="month-name"></div>
    </div>
    <div class="saldo">
        <div class="pinpas"><img src="https://www.chrisdejager.nl/toeslagen/pinpas.png"/></div>
        <div class="amount-container">
            Je saldo:<br/>
            &euro; <div class="amount"></div>
        </div>
    </div>
</div>

<script>

    if (!window.toeslagen) {
        const script = document.createElement('script');
        script.src = 'https://www.chrisdejager.nl/toeslagen/toeslagen.js';
        script.defer = true;
        script.onload = () => { init(); };
        document.body.appendChild(script);
    } else {
        console.log('Script is already loaded.');
        init();
    }

    function init() {
        Qualtrics.SurveyEngine.addOnReady(function()
        {
            window.toeslagen.runOnNewSlide(parseInt('${e://Field/enable_previous_button}'), parseInt('${e://Field/start_saldo}'), '${e://Field/month}');
        });
    }

</script>
