<div class="progress-bar ${e://Field/header}">
    <div class="line">&nbsp;</div>

    <div class="circle-container">
        <div class="circle">&nbsp;</div>

        <div class="month-name">&nbsp;</div>
    </div>

    <div class="saldo">
        <div class="pinpas"><img src="https://www.chrisdejager.nl/toeslagen/pinpas.png" /></div>

        <div class="amount-container">Je saldo:<br />
            &euro;
            <div class="amount">&nbsp;</div>
        </div>
    </div>
</div>
<script>

    if (!window.toeslagen) {
        const script = document.createElement('script');
        script.src = 'https://cdn.chrisdejager.nl/toeslagen/v5/toeslagen.js';
        script.defer = true;
        script.type = 'module';
        script.onload = () => { init(); };
        document.body.appendChild(script);
    } else {
        console.log('Script is already loaded.');
        init();
    }

    function init() {
        Qualtrics.SurveyEngine.addOnReady(function() {
            window.toeslagen.runOnNewSlide('${e://Field/google_sheet_csv_url}', '${e://Field/enable_previous_button}', '${e://Field/start_saldo}', '${e://Field/month}', '${e://Field/toeslag_naam}', '${e://Field/toeslag_percentage}');
        });
        Qualtrics.SurveyEngine.addOnPageSubmit(function(type) {
            if (type === "prev") {
                window.toeslagen.runOnPreviousButton();
            }
        });
    }

</script>
