name: CI / Deploy

on:
  push:
    branches-ignore:
      - github-pages
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: npm

      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: branch
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4.4.0

      - run: npm ci
      - run: npm run build
        env:
          BUILD_VERSION: ${{ steps.branch.outputs.VERSION }}

      - name: Checkout github-pages
        uses: actions/checkout@v4.2.2
        with:
          ref: github-pages
          path: github-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy build to version folder
        env:
          VERSION: ${{ steps.branch.outputs.VERSION }}
        run: |
          MAJOR=$(echo "$VERSION" | sed 's/\..*//')
          rm -rf github-pages/$MAJOR
          mv dist/$VERSION github-pages/$MAJOR
          cp dist/qualtrics-header-$VERSION.html github-pages/$MAJOR/toeslagen-header.html

      - name: Commit and push
        run: |
          cd github-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add .
          git commit -m "deploy ${{ steps.branch.outputs.VERSION }}"
          git push